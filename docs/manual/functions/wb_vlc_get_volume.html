<p><b>int wb_vlc_get_volume</b>(int wbObject)</p>
<p>Returns current VLC volume level.</p>
<h1>Example</h1>
<pre class="php-highlight"><span class="php-tag">&lt;?php</span>
<span class="php-variable">$volume</span> = wb_vlc_get_volume(<span class="php-variable">$vlc</span>);
