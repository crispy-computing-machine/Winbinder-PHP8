<h2>wb_vlc_is_playing</h2>
<p><b>bool wb_vlc_is_playing</b>(int wbObject)</p>
<p>Checks whether the VLC control is currently playing media.</p>
<h1>Example</h1>
<pre class="php-highlight"><span class="php-tag">&lt;?php</span>
<span class="php-keyword">if</span> (wb_vlc_is_playing(<span class="php-variable">$vlc</span>)) {
    wb_vlc_pause(<span class="php-variable">$vlc</span>);
}
</pre>

<p><a href="wb_vlc_play.html">wb_vlc_play()</a><br><a href="wb_vlc_pause.html">wb_vlc_pause()</a><br><a href="wb_vlc_stop.html">wb_vlc_stop()</a></p>
</body></html>
