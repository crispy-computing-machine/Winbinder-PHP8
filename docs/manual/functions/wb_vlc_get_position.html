<h2>wb_vlc_get_position</h2>
<p><b>float wb_vlc_get_position</b>(int wbObject)</p>
<p>Gets relative playback position from <span class="code">0.0</span> to <span class="code">1.0</span>.</p>
<h1>Example</h1>
<pre class="php-highlight"><span class="php-tag">&lt;?php</span>
<span class="php-variable">$fraction</span> = wb_vlc_get_position(<span class="php-variable">$vlc</span>);
</pre>
