<h2>wb_chart_set_data</h2>
<p>bool <b>wb_chart_set_data</b> (int chart, array series)</p>
<p>Assigns one or more chart series to a <a href="../classes/chartcontrol.html">ChartControl</a>.</p>
<p>Each series must contain:</p>
<ul>
<li><code>name</code> (string)</li>
<li><code>points</code> (array)</li>
<li>optional <code>type</code>: <code>line</code>, <code>bar</code>, <code>scatter</code></li>
</ul>
<p>Returns <code>FALSE</code> for malformed series/point payloads.</p>
</body></html>
