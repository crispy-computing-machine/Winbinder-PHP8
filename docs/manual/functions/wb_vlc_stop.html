<h2>wb_vlc_stop</h2>
<p><b>bool wb_vlc_stop</b>(int wbObject)</p>
<p>Stops playback and resets position in a VLC control.</p>
<h1>Example</h1>
<pre class="php-highlight"><span class="php-tag">&lt;?php</span>
wb_vlc_stop(<span class="php-variable">$vlc</span>);
</pre>
