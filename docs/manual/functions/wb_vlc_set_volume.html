<h2>wb_vlc_set_volume</h2>
<p><b>bool wb_vlc_set_volume</b>(int wbObject, int volume)</p>
<p>Sets VLC volume. Typical range is 0-200, with 100 as normal.</p>
<h1>Example</h1>
<pre class="php-highlight"><span class="php-tag">&lt;?php</span>
wb_vlc_set_volume(<span class="php-variable">$vlc</span>, 80);
</pre>

<p><a href="wb_vlc_get_volume.html">wb_vlc_get_volume()</a></p>
