<h2>wb_vlc_seek</h2>
<p><b>bool wb_vlc_seek</b>(int wbObject, int position_ms)</p>
<p>Seeks to an absolute position in milliseconds.</p>
<h1>Example</h1>
<pre class="php-highlight"><span class="php-tag">&lt;?php</span>
wb_vlc_seek(<span class="php-variable">$vlc</span>, 90 * 1000); <span class="php-comment">// Jump to 1:30</span>
</pre>
