<h2>wb_set_theme_color</h2>
<p>Sets a theme palette color for <code>WBT_THEME_LIGHT</code>, <code>WBT_THEME_DARK</code>, or <code>WBT_THEME_CUSTOM</code>.</p>
<pre>bool wb_set_theme_color(int $theme, int $role, int $color)</pre>
<p>Roles: <code>WBT_COLOR_ROLE_TEXT</code>, <code>WBT_COLOR_ROLE_BACKGROUND</code>, <code>WBT_COLOR_ROLE_ACCENT</code>.</p>
