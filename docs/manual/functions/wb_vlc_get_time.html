<h2>wb_vlc_get_time</h2>
<p><b>int wb_vlc_get_time</b>(int wbObject)</p>
<p>Returns current playback time in milliseconds.</p>
<h1>Example</h1>
<pre class="php-highlight"><span class="php-tag">&lt;?php</span>
<span class="php-variable">$ms</span> = wb_vlc_get_time(<span class="php-variable">$vlc</span>);
</pre>
