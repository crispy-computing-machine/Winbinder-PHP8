<html><head><title>wb_task_poll</title><link rel="stylesheet" href="../help.css"></head><body>
<h2>wb_task_poll</h2>
<p>array|null <b>wb_task_poll</b> (int task_id)</p>
<p>Returns an associative array with current task state:</p>
<ul><li><code>status</code> (one of <code>WB_TASK_STATUS_*</code>)</li><li><code>progress</code></li><li><code>exit_code</code></li><li><code>error_code</code></li></ul>
<p>Returns <code>null</code> when the task id is unknown.</p>
</body></html>
