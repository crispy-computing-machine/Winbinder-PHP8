<h2>wb_chart_set_options</h2>
<p>bool <b>wb_chart_set_options</b> (int chart, array options)</p>
<p>Sets chart options like <code>title</code>, <code>x_label</code>, <code>y_label</code>, <code>padding</code>, and optional axis bounds <code>min_x</code>, <code>max_x</code>, <code>min_y</code>, <code>max_y</code>.</p>
