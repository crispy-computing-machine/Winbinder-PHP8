<h2>wb_vlc_set_position</h2>
<p><b>bool wb_vlc_set_position</b>(int wbObject, float position)</p>
<p>Sets relative playback position where <span class="code">0.0</span> is start and <span class="code">1.0</span> is end.</p>
<h1>Example</h1>
<pre class="php-highlight"><span class="php-tag">&lt;?php</span>
wb_vlc_set_position(<span class="php-variable">$vlc</span>, 0.5); <span class="php-comment">// Jump to 50%</span>
</pre>
<h1>See also</h1>
<p><a href="wb_vlc_get_position.html">wb_vlc_get_position()</a><br><a href="wb_vlc_seek.html">wb_vlc_seek()</a></p>
</body></html>
