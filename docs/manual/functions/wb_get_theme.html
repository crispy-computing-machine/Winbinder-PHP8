<!doctype html><html><body>
<h2>wb_get_theme</h2>
<p>Gets the effective theme for the global context or a specific object.</p>
<pre>int wb_get_theme([int $wbObject])</pre>
<p>Returns one of <code>WBT_THEME_DEFAULT</code>, <code>WBT_THEME_LIGHT</code>, or <code>WBT_THEME_DARK</code>, or <code>WBT_THEME_CUSTOM</code>.</p>
</body></html>
